name: notesheet_tracker
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI and utility dependencies
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  provider: ^6.1.2
  uuid: ^4.5.1
  
  # Supabase for file storage
  supabase_flutter: ^2.8.0
  
  # PDF handling
  flutter_pdfview: ^1.3.2
  path: ^1.9.0
  http: ^1.2.0
  
  # Logging and debugging
  logger: ^2.4.0
  flutter_logs: ^2.1.12
  syncfusion_flutter_pdfviewer: ^30.1.39
  device_info_plus: ^11.5.0
  webview_flutter: ^4.7.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
